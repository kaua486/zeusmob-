<!DOCTYPE html>
<!--
  This file is the entry for ALL routes, including /preview/* canvas iframes.
  Fonts are loaded here as non-blocking <link> tags (not CSS @import, which is render-blocking).
-->
<html lang="en" style="height: 100%">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <meta property="og:title" content="Mockup Canvas" />
    <meta property="og:description" content="UI prototyping sandbox with infinite canvas" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mockup Canvas" />
    <meta name="twitter:description" content="UI prototyping sandbox with infinite canvas" />

    <title>Mockup Canvas</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
    <!-- Non-blocking font bundle: renders with fallback fonts immediately, swaps in when loaded -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" media="print" onload="this.media='all'"
          href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fira+Code:wght@300..700&family=Geist+Mono:wght[...]
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fira+Code:wght@300.[...]
    
    <!-- Virtual Cursor Styles - Loaded in HEAD for immediate visibility -->
    <style>
      #virtual-cursor {
        width: 24px;
        height: 24px;
        background: #FFFFFF !important;
        border: 2px solid #333333 !important;
        border-radius: 50% !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        z-index: 999999999 !important;
        pointer-events: none !important;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.9), 0 0 20px rgba(255, 255, 255, 0.5) !important;
        transition: transform 0.02s linear !important;
        display: block !important;
        visibility: visible !important;
        opacity: 1 !important;
        will-change: transform;
      }
    </style>
  </head>
  <body style="height: 100%; margin: 0">
    <!-- Virtual Cursor Element - Added FIRST in body -->
    <div id="virtual-cursor"></div>
    
    <div id="root" style="height: 100%"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- Virtual Cursor Implementation - Executes immediately -->
    <script>
      (function initVirtualCursor() {
        console.log('[Virtual Cursor] Inicializando cursor virtual...');
        
        // Garantir que o elemento existe
        let cursor = document.getElementById("virtual-cursor");
        if (!cursor) {
          console.error('[Virtual Cursor] Elemento #virtual-cursor não encontrado!');
          // Criar elemento como fallback
          cursor = document.createElement('div');
          cursor.id = 'virtual-cursor';
          document.body.appendChild(cursor);
          console.log('[Virtual Cursor] Elemento criado como fallback');
        }

        let x = window.innerWidth / 2;
        let y = window.innerHeight / 2;
        let isVisible = true;

        function moveCursor(posX, posY) {
          if (!cursor) return;
          cursor.style.transform = `translate(${posX - 12}px, ${posY - 12}px)`;
        }

        // Forçar visibilidade inicial
        cursor.style.display = 'block';
        cursor.style.visibility = 'visible';
        cursor.style.opacity = '1';
        moveCursor(x, y);
        console.log('[Virtual Cursor] Cursor inicializado em posição:', x, y);

        // Track touch movement (iPhone, Android)
        document.addEventListener("touchstart", (e) => {
          isVisible = true;
          cursor.style.opacity = '1';
          console.log('[Virtual Cursor] Touch iniciado');
        }, false);

        document.addEventListener("touchmove", (e) => {
          const touch = e.touches[0];
          x = touch.clientX;
          y = touch.clientY;
          moveCursor(x, y);
        }, { passive: true });

        document.addEventListener("touchend", () => {
          console.log('[Virtual Cursor] Touch finalizado');
        }, false);

        // Track mouse movement (Desktop)
        document.addEventListener("mousemove", (e) => {
          x = e.clientX;
          y = e.clientY;
          moveCursor(x, y);
        }, false);

        // Mostrar cursor ao entrar na janela
        document.addEventListener("mouseenter", () => {
          isVisible = true;
          cursor.style.opacity = '1';
        }, false);

        // Esconder cursor ao sair da janela
        document.addEventListener("mouseleave", () => {
          isVisible = false;
          cursor.style.opacity = '0.5';
        }, false);

        // Garantir visibilidade ao focar na janela
        window.addEventListener("focus", () => {
          isVisible = true;
          cursor.style.opacity = '1';
        }, false);

        console.log('[Virtual Cursor] Cursor virtual ativado com sucesso!');
        console.log('[Virtual Cursor] Eventos touchmove e mousemove registrados');
      })();
    </script>
  </body>
</html>
